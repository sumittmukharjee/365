.tag{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;display:inline-block;flex-shrink:0;white-space:nowrap}
.tab-nav{display:flex;gap:5px;overflow-x:auto;padding:4px 0;margin-bottom:12px;scrollbar-width:thin;-webkit-overflow-scrolling:touch}
.tab-nav::-webkit-scrollbar{height:3px}.tab-nav::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.tab-btn{padding:8px 12px;border-radius:8px;border:none;cursor:pointer;font-size:12px;white-space:nowrap;font-weight:500;transition:all .2s;font-family:inherit;flex-shrink:0}
.week-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:7px;cursor:pointer;transition:all .2s}
.week-card:hover{border-color:var(--or);box-shadow:0 0 12px var(--orglow)}
.acc-sec{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;transition:all .3s}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;cursor:pointer;gap:10px;user-select:none}
.chk-row{display:flex;gap:10px;align-items:flex-start;padding:8px 6px;cursor:pointer;border-radius:6px;margin-bottom:2px;transition:background .2s;user-select:none}
.chk-box{width:16px;height:16px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .2s;font-size:9px;font-weight:900;color:white;line-height:1}
.phase-btn{flex:1;padding:8px 4px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:600;line-height:1.4;font-family:inherit;border:2px solid transparent;transition:all .2s}
.etag{padding:2px 6px;border-radius:3px;font-size:9px;font-weight:800;display:inline-block;margin:1px 2px 1px 0;white-space:nowrap}
.toggle-btn{position:fixed;top:12px;right:12px;z-index:999;padding:7px 12px;border-radius:20px;border:1px solid var(--border2);cursor:pointer;font-size:11px;font-weight:700;background:var(--card);color:var(--t2);transition:all .2s;font-family:inherit}
.toggle-btn:hover{border-color:var(--or);color:var(--or)}
.glow-bar{background:linear-gradient(90deg,var(--cr),var(--or),var(--am));border-radius:6px;height:10px;transition:width .4s}
.prog-wrap{background:var(--border2);border-radius:6px;height:10px;width:240px;overflow:hidden;margin:0 auto}
hr.div{border:none;border-top:1px solid var(--border);margin:8px 0}

function T(text,color){return'<span class="tag" style="background:'+color+'22;color:'+color+'">'+text+'</span>';}
function ET(codes){
  if(!codes||!codes.length)return'';
  return'<div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:2px">'+
    codes.map(c=>{const e=EC[c];return'<span class="etag" style="background:'+e.color+'22;color:'+e.color+'">'+e.code+'</span>';}).join('')+
  '</div>';
}
function totalT(){return SK.reduce((s,k)=>s+SYL[k].topics.length,0);}
function doneT(){return Object.keys(S.chk).filter(k=>S.chk[k]).length;}

      +T(dn+'/'+d.topics.length,d.color)
      +'<div style="background:var(--border2);border-radius:4px;height:6px;width:50px;overflow:hidden;display:inline-block">'
      +'<div style="background:'+d.color+';height:6px;width:'+pct+'%;box-shadow:0 0 6px '+d.color+'88"></div></div>'
      +'<span style="color:var(--t3);font-size:13px">'+(open?'▲':'▼')+'</span></div></div>';
    if(open){
      h+='<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px">';
      d.topics.forEach((tp,ti)=>{
        const ck=S.chk[si+'_'+ti];
        const exCodes=TM[si]&&TM[si][ti]?TM[si][ti]:[];
        h+='<div class="chk-row" onclick="sc('+si+','+ti+')" style="background:'+(ck?d.color+'14':'transparent')+'">'
          +'<div class="chk-box" style="border:2px solid '+(ck?d.color:'var(--border2)')+';background:'+(ck?d.color:'transparent')+'">'+(ck?'✓':'')+'</div>'
          +'<div style="flex:1"><span style="font-size:12px;color:'+(ck?d.color:'var(--t2)')+';text-decoration:'+(ck?'line-through':'none')+';line-height:1.5">'+tp+'</span>'
          +ET(exCodes)+'</div></div>';
      });
      h+='</div>';
    }
    h+='</div>';
  });

  // Extra Topics Section
  h+='<div style="font-size:14px;font-weight:800;color:var(--am);margin:20px 0 8px;text-shadow:0 0 15px rgba(251,191,36,.3)">➕ Extra Topics by Exam Type</div>';
  h+='<div style="font-size:12px;color:var(--t3);margin-bottom:12px">Topics <strong style="color:var(--t2)">not</strong> in the RBI/SEBI core syllabus but required for specific exams. Prep only if targeting those exams.</div>';
  EXTRA.forEach(ex=>{
    h+='<div class="card" style="border-color:'+ex.border+';box-shadow:0 0 14px '+ex.color+'18">'
      +'<div style="font-size:13px;font-weight:700;color:'+ex.color+';margin-bottom:6px;text-shadow:0 0 10px '+ex.color+'44">'+ex.cat+'</div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px">'
      +ex.exams.map(e=>'<span class="etag" style="background:'+ex.color+'22;color:'+ex.color+'">'+e+'</span>').join('')
      +'</div>';
    ex.topics.forEach(tp=>{
      h+='<div style="padding:6px 0;border-top:1px solid var(--border)">'
        +'<div style="font-size:12px;color:var(--t2);line-height:1.5">'+tp.t+'</div>'
        +'<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:4px">'
        +tp.ex.map(e=>'<span class="etag" style="background:'+ex.color+'18;color:'+ex.color+'">'+e+'</span>').join('')
        +'</div></div>';
    });
    h+='</div>';
  });
  return h;
}

// ─── MOCKS ────────────────────────────────────────────────────────────────────
function mocks(){
  let h='';
  MOCKS.forEach(m=>{
    h+='<div class="card" style="border-left:4px solid '+m.color+';box-shadow:0 0 16px '+m.color+'22">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;flex-wrap:wrap;gap:6px">'
      +'<div style="font-weight:700;color:'+m.color+';font-size:13px;text-shadow:0 0 10px '+m.color+'66">'+m.phase+'</div>'
      +'<div style="display:flex;gap:5px">'+T(m.freq,m.color)+' '+T(m.type,'var(--t3)')+'</div></div>'
      +'<p style="font-size:12px;color:var(--t2);line-height:1.7;margin:0 0 8px">'+m.details+'</p>'
      +'<div style="font-size:11px;color:var(--t3)"><span style="color:var(--t2);font-weight:600">Practice on: </span>'+m.exams+'</div></div>';
  });
  h+='<div class="card" style="border-color:var(--am)">'
    +'<div style="font-weight:700;color:var(--am);font-size:13px;margin-bottom:8px">📋 Error Log System — Non-Negotiable Rule</div>'
    +'<p style="font-size:12px;color:var(--t2);line-height:1.7;margin:0 0 10px">After every mock, log each wrong answer with three things: the topic, the error type, and the correct approach. Review every Sunday. This single habit separates rankers from average scorers more than mock frequency ever will.</p>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">';
  [["Concept Gap","Re-study the chapter","#ef4444"],["Silly Mistake","Drill similar Qs","#f97316"],["Time Pressure","Speed drills + shortcuts","#3b82f6"]].forEach(([t,s,c])=>{
    h+='<div style="background:'+c+'11;border:1px solid '+c+'33;border-radius:8px;padding:8px;text-align:center">'
      +'<div style="color:'+c+';font-weight:700;font-size:11px">'+t+'</div>'
      +'<div style="color:var(--t3);font-size:10px;margin-top:3px">'+s+'</div></div>';
  });
  h+='</div><div style="font-weight:700;color:var(--t1);font-size:13px;margin-bottom:10px">📈 Score Target Progression</div>';
  [{p:"Phase 1 — Sectionals",t:"≥ 60–65%",c:"#3b82f6"},{p:"Phase 2 — Full Phase 1 Mocks",t:"≥ 65–70%",c:"#10b981"},{p:"Phase 3 — Full Phase 1 Mocks",t:"≥ 72–78%",c:"#f97316"},{p:"Phase 4 — Grand Tests",t:"≥ 80–85%",c:"#e53e3e"}].forEach((x,i)=>{
    h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;'+(i<3?'border-bottom:1px solid var(--border);':'')+'">'
      +'<span style="font-size:12px;color:var(--t2)">'+x.p+'</span>'+T(x.t,x.c)+'</div>';
  });
  h+='</div>';
  return h;
}

// ─── SCHEDULE ─────────────────────────────────────────────────────────────────
function schedule(){
  const tc={personal:"var(--t3)",ga:"var(--am)",core:"var(--cr)",quant:"var(--gr)",reasoning:"var(--pu)",english:"var(--bl)",mock:"var(--pi)",revision:"var(--cy)"};
  const tl={personal:"Lifestyle",ga:"Curr. Affairs",core:"Core Subject",quant:"Quant",reasoning:"Reasoning",english:"English",mock:"Mock/PYQ",revision:"Revision"};
  let h='<div class="card" style="border-color:var(--cr)"><div style="font-weight:700;color:var(--cr);font-size:14px;margin-bottom:4px;text-shadow:0 0 12px var(--crglow)">⏰ Ideal Daily Schedule (~10.5 Hours Study)</div><div style="font-size:11px;color:var(--t3);margin-bottom:12px">Adjust timings to your routine. Keep the subject sequence and total hours consistent.</div>';
  SCHED.forEach((item,i)=>{
    h+='<div style="display:flex;gap:10px;padding:8px 0;'+(i<SCHED.length-1?'border-bottom:1px solid var(--border);':'')+' align-items:flex-start">'
      +'<div style="flex-shrink:0;width:100px;font-size:11px;color:var(--t3);font-family:monospace;padding-top:2px">'+item.time+'</div>'
      +'<div style="flex:1;font-size:12px;color:var(--t1);line-height:1.5">'+item.task+'</div>'
      +'<div style="flex-shrink:0">'+T(tl[item.type],tc[item.type])+'</div></div>';
  });
  h+='</div><div class="card"><div style="font-weight:700;color:var(--t1);font-size:13px;margin-bottom:10px">📊 Daily Subject Hour Allocation</div>';
  [{l:"Core Subjects (ESI / F&M / SEBI)",h:"1.5 hrs",c:"var(--cr)"},{l:"Quantitative Aptitude",h:"1.5 hrs",c:"var(--gr)"},{l:"Reasoning Ability",h:"1.25 hrs",c:"var(--pu)"},{l:"English Language",h:"1.0 hr",c:"var(--bl)"},{l:"Mock Test + Analysis",h:"2.0 hrs",c:"var(--pi)"},{l:"Current Affairs + Static GK",h:"2.25 hrs",c:"var(--am)"},{l:"Revision + Planning",h:"1.0 hr",c:"var(--cy)"}].forEach((x,i)=>{
    h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;'+(i<6?'border-bottom:1px solid var(--border);':'')+'">'
      +'<div style="display:flex;gap:6px;align-items:center"><div style="width:10px;height:10px;border-radius:2px;background:'+x.c+';flex-shrink:0;box-shadow:0 0 6px '+x.c+'88"></div>'
      +'<span style="font-size:12px;color:var(--t2)">'+x.l+'</span></div>'+T(x.h,x.c)+'</div>';
  });
  h+='<div style="margin-top:10px;padding:8px;background:var(--bg2);border-radius:8px;text-align:center;border:1px solid var(--border)">'
    +'<span style="font-size:12px;color:var(--t3)">Total: </span><span style="font-weight:700;color:var(--cr);font-size:14px">~10.5 hrs study</span>'
    +'<span style="font-size:12px;color:var(--t3)"> + meals/breaks</span></div></div>'
    +'<div class="card" style="border-color:var(--gr)"><div style="font-weight:700;color:var(--gr);font-size:13px;margin-bottom:8px">🌿 Weekly Rhythm &amp; Rest Strategy</div>'
    +'<p style="font-size:12px;color:var(--t2);line-height:1.7"><strong style="color:var(--t1)">Sunday:</strong> Take your full Phase 1 mock in the morning (from Phase 2 onwards). Spend the afternoon on analysis + weekly revision. Take 2–3 hours fully off in the evening — this is not negotiable. Every 4 weeks, give yourself a half-day of complete rest with zero study. Mental recovery directly improves retention, recall speed, and mock performance. Treat rest as part of your strategy, not a reward.</p></div>';
  return h;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function content(){
  switch(S.tab){case 0:return overview();case 1:return phases();case 2:return syllabus();case 3:return mocks();case 4:return schedule();}
}
function upd(){
  document.getElementById('tab-content').innerHTML=content();
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    const a=S.tab===i;
    b.style.background=a?'var(--cr)':'var(--card)';
    b.style.color=a?'white':'var(--t2)';
    b.style.borderColor=a?'var(--cr)':'var(--border)';
    b.style.boxShadow=a?'0 0 12px var(--crglow)':'none';
  });
  const tot=totalT(),dn=doneT(),pct=Math.round(dn/tot*100);
  const pb=document.getElementById('pb'),pt=document.getElementById('pt');
  if(pb)pb.style.width=pct+'%';
  if(pt)pt.innerHTML=dn+' / '+tot+' topics &nbsp;·&nbsp; '+pct+'% complete';
}
function render(){
  document.getElementById('app').innerHTML=hdr()+'<div class="tab-nav" id="tn">'+nav()+'</div><div id="tab-content">'+content()+'</div>';
}
function st(i){S.tab=i;S.week=null;upd();}
function sp(i){S.phase=i;S.week=null;upd();}
function sw(i){S.week=S.week===i?null:i;upd();}
function ss(si){S.sec=S.sec===SK[si]?null:SK[si];upd();}
function sc(si,ti){const k=si+'_'+ti;S.chk[k]=!S.chk[k];save();upd();}
render();
</script>
</body>
</html>
